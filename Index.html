<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TipMaster Pro</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700;900&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{--g:#00e676;--gold:#ffd600;--red:#ff1744;--or:#ff8a65;--dark:#0a0f0a;--d2:#111811;--d3:#1a221a;--d4:#222e22;--b:#2a3a2a;--t:#e8f5e9;--m:#6a8f6a;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--dark);color:var(--t);font-family:'Barlow',sans-serif;min-height:100vh;}
header{background:linear-gradient(135deg,#0d1a0d,#0a1a00);border-bottom:2px solid var(--g);padding:0 16px;position:sticky;top:0;z-index:100;}
.hi{max-width:860px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;height:56px;}
.logo{font-family:'Barlow Condensed';font-weight:900;font-size:24px;color:var(--g);text-transform:uppercase;letter-spacing:1px;}
.logo b{color:var(--gold);}
.badge{background:rgba(255,214,0,.12);border:1px solid var(--gold);color:var(--gold);font-size:10px;font-weight:700;padding:3px 10px;border-radius:20px;letter-spacing:1px;}
main{max-width:860px;margin:0 auto;padding:16px 12px 60px;}

/* STATS */
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:16px;}
.sbox{background:var(--d2);border:1px solid var(--b);border-radius:10px;padding:12px 8px;text-align:center;}
.sval{font-family:'Barlow Condensed';font-weight:900;font-size:22px;line-height:1;margin-bottom:3px;}
.slbl{font-size:9px;font-weight:600;color:var(--m);text-transform:uppercase;letter-spacing:.8px;}

/* FILTER */
.fbar{background:var(--d2);border:1px solid var(--b);border-radius:12px;padding:14px;margin-bottom:16px;}
.flbl{font-size:10px;font-weight:600;color:var(--m);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:6px;}
.frow{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px;}
.fsel{background:var(--d3);border:1px solid var(--b);color:var(--t);font-family:'Barlow';font-size:13px;padding:7px 10px;border-radius:7px;flex:1;min-width:120px;outline:none;}
.ftags{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px;}
.ftag{background:var(--d3);border:1px solid var(--b);color:var(--m);font-family:'Barlow';font-size:12px;font-weight:600;padding:6px 11px;border-radius:20px;cursor:pointer;transition:all .2s;white-space:nowrap;}
.ftag.on{border-color:var(--g);color:var(--g);background:rgba(0,230,118,.12);}
.ftag .n{background:var(--d4);border-radius:10px;padding:1px 6px;font-size:10px;margin-left:3px;}
.ftag.on .n{background:rgba(0,230,118,.2);}
.btn{background:rgba(0,230,118,.1);border:1px solid var(--g);color:var(--g);font-family:'Barlow';font-size:13px;font-weight:600;padding:9px;border-radius:8px;cursor:pointer;width:100%;}
.btn:disabled{opacity:.4;cursor:not-allowed;}

/* LOAD */
.pbar{height:3px;background:var(--d4);border-radius:2px;margin-bottom:6px;display:none;}
.pbar.show{display:block;}
.pfill{height:100%;background:var(--g);border-radius:2px;transition:width .3s;}
.pst{font-size:12px;color:var(--m);text-align:center;margin-bottom:14px;min-height:16px;}
.spin{width:36px;height:36px;border:3px solid var(--b);border-top-color:var(--g);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 14px;}
@keyframes spin{to{transform:rotate(360deg);}}
.loading{text-align:center;padding:40px 20px;color:var(--m);}

/* TOP PICKS */
.sec{font-family:'Barlow Condensed';font-weight:700;font-size:13px;letter-spacing:3px;text-transform:uppercase;color:var(--m);margin-bottom:12px;display:flex;align-items:center;gap:8px;}
.sec::after{content:'';flex:1;height:1px;background:var(--b);}

.pick{border-radius:12px;padding:13px 15px;margin-bottom:10px;display:flex;align-items:flex-start;gap:12px;border:1px solid;}
.pick.hot{background:linear-gradient(135deg,#1a1200,#111811);border-color:rgba(255,214,0,.5);}
.pick.good{background:linear-gradient(135deg,#001a0a,#111811);border-color:rgba(0,230,118,.35);}
.pick.warn{background:rgba(255,87,34,.05);border-color:rgba(255,87,34,.3);}
.pnum{font-family:'Barlow Condensed';font-weight:900;font-size:30px;color:rgba(255,255,255,.1);line-height:1;flex-shrink:0;width:26px;}
.pbody{flex:1;}
.ptyp{font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:3px;}
.ptyp.hot{color:var(--gold);}
.ptyp.good{color:var(--g);}
.ptyp.warn{color:var(--or);}
.pmatch{font-family:'Barlow Condensed';font-weight:700;font-size:15px;margin-bottom:2px;}
.ptip{font-size:13px;font-weight:600;margin-bottom:3px;}
.ptip.hot{color:var(--gold);}
.ptip.good{color:var(--g);}
.pinfo{font-size:11px;color:var(--m);line-height:1.5;}
.pright{text-align:right;flex-shrink:0;}
.podds{font-family:'Barlow Condensed';font-weight:900;font-size:24px;color:var(--gold);}
.pbm{font-size:10px;color:var(--m);}

/* WARN BOX */
.warnbox{background:rgba(255,87,34,.07);border:1px solid rgba(255,87,34,.25);border-radius:10px;padding:11px 14px;margin-bottom:10px;display:flex;gap:10px;}
.warnbox-icon{font-size:16px;flex-shrink:0;}
.warnbox-body strong{font-size:13px;color:var(--or);display:block;margin-bottom:2px;}
.warnbox-body p{font-size:12px;color:#ffccbc;line-height:1.5;}

/* GAME CARDS */
.list{display:flex;flex-direction:column;gap:11px;}
.card{background:var(--d2);border:1px solid var(--b);border-radius:13px;overflow:hidden;cursor:pointer;transition:border-color .2s,transform .15s;animation:si .35s ease both;}
@keyframes si{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:translateY(0);}}
.card:hover{border-color:rgba(0,230,118,.4);transform:translateY(-2px);}
.card.open{border-color:var(--g);}
.card.danger{border-color:rgba(255,87,34,.3);}
.sbar{height:3px;}
.ch{padding:13px 15px;display:grid;grid-template-columns:1fr auto;gap:10px;align-items:start;}
.cm{display:flex;flex-direction:column;gap:4px;}
.cmatch{font-family:'Barlow Condensed';font-weight:700;font-size:16px;line-height:1.15;}
.csub{display:flex;gap:6px;flex-wrap:wrap;align-items:center;}
.cleague{font-size:11px;font-weight:600;color:var(--m);text-transform:uppercase;}
.ctime{font-size:11px;color:var(--m);}
.bt{font-size:10px;font-weight:700;padding:2px 7px;border-radius:10px;}
.bt-today{background:rgba(0,230,118,.15);color:var(--g);}
.bt-tomorrow{background:rgba(255,214,0,.12);color:var(--gold);}
.bt-warn{background:rgba(255,87,34,.15);color:var(--or);}
.tags{display:flex;gap:4px;flex-wrap:wrap;margin-top:3px;}
.tag{font-size:10px;font-weight:700;padding:2px 7px;border-radius:10px;}
.tag-hot{background:rgba(255,214,0,.12);color:var(--gold);border:1px solid rgba(255,214,0,.2);}
.tag-good{background:rgba(0,230,118,.1);color:var(--g);border:1px solid rgba(0,230,118,.2);}
.tag-warn{background:rgba(255,87,34,.1);color:var(--or);border:1px solid rgba(255,87,34,.2);}
.tag-neu{background:rgba(100,181,246,.1);color:#64b5f6;border:1px solid rgba(100,181,246,.2);}
.cr{display:flex;flex-direction:column;align-items:flex-end;gap:4px;flex-shrink:0;}
.cscore{font-family:'Barlow Condensed';font-weight:900;font-size:12px;padding:3px 9px;border-radius:6px;}
.sc-hot{background:rgba(255,214,0,.15);color:var(--gold);}
.sc-good{background:rgba(0,230,118,.12);color:var(--g);}
.sc-cool{background:rgba(100,181,246,.1);color:#64b5f6;}
.sc-skip{background:rgba(255,87,34,.1);color:var(--or);}
.codds{font-family:'Barlow Condensed';font-weight:900;font-size:22px;color:var(--gold);line-height:1;}
.cbm{font-size:10px;color:var(--m);}

/* EXPAND */
.cx{border-top:1px solid var(--b);background:var(--d3);max-height:0;overflow:hidden;transition:max-height .4s ease,padding .2s;}
.card.open .cx{max-height:700px;padding:15px;}
.xt{font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--m);margin-bottom:8px;margin-top:12px;}
.xt:first-child{margin-top:0;}
.sig{background:var(--d4);border-radius:8px;padding:9px 12px;margin-bottom:6px;display:flex;gap:9px;}
.sigico{font-size:15px;flex-shrink:0;}
.sigb{flex:1;}
.sign{font-size:12px;font-weight:700;margin-bottom:2px;}
.sigd{font-size:12px;color:var(--m);line-height:1.5;}
.sigstr{font-family:'Barlow Condensed';font-weight:900;font-size:13px;flex-shrink:0;}
.str-h{color:var(--gold);}
.str-m{color:var(--g);}
.str-w{color:var(--or);}
.str-l{color:var(--m);}
.odds3{display:flex;gap:7px;margin-bottom:10px;}
.ob{flex:1;background:var(--d4);border:1px solid var(--b);border-radius:8px;padding:9px;text-align:center;}
.ob.best{border-color:var(--g);}
.obl{font-size:10px;color:var(--m);margin-bottom:3px;}
.obv{font-family:'Barlow Condensed';font-weight:900;font-size:18px;color:var(--gold);}
.obp{font-size:11px;color:var(--m);}
.bmrow{display:flex;justify-content:space-between;font-size:12px;padding:3px 0;border-bottom:1px solid var(--d4);}
.bmrow:last-child{border:none;}
.bml{color:var(--m);}
.rec{background:rgba(0,230,118,.07);border:1px solid rgba(0,230,118,.25);border-radius:10px;padding:12px 14px;display:flex;align-items:center;gap:12px;margin-top:4px;}
.rect{font-family:'Barlow Condensed';font-weight:700;font-size:16px;flex:1;}
.reco{font-family:'Barlow Condensed';font-weight:900;font-size:26px;color:var(--gold);}
.recs{font-size:12px;color:var(--m);}
.empty{text-align:center;padding:40px;color:var(--m);}
.disc{margin-top:24px;padding:12px;background:rgba(255,23,68,.06);border:1px solid rgba(255,23,68,.2);border-radius:8px;font-size:11px;color:#e57373;text-align:center;line-height:1.5;}
</style>
</head>
<body>
<header>
  <div class="hi">
    <div class="logo">⚽ Tip<b>Master</b> Pro</div>
    <div class="badge">🔍 Smart Analyse</div>
  </div>
</header>
<main>
  <div class="stats">
    <div class="sbox"><div class="sval" id="s-total" style="color:var(--g)">–</div><div class="slbl">Spiele</div></div>
    <div class="sbox"><div class="sval" id="s-hot" style="color:var(--gold)">–</div><div class="slbl">🔥 Top Picks</div></div>
    <div class="sbox"><div class="sval" id="s-skip" style="color:var(--red)">–</div><div class="slbl">⚠️ Vorsicht</div></div>
    <div class="sbox"><div class="sval" id="s-con" style="color:#64b5f6">–</div><div class="slbl">🤝 Konsens</div></div>
  </div>

  <div class="fbar">
    <div class="frow">
      <div style="flex:1;min-width:120px">
        <div class="flbl">Liga</div>
        <select class="fsel" id="f-league" onchange="render()"><option value="all">Alle Ligen</option></select>
      </div>
      <div style="flex:1;min-width:120px">
        <div class="flbl">Zeitraum</div>
        <select class="fsel" id="f-when" onchange="render()">
          <option value="all">Alle anstehenden</option>
          <option value="today">Heute</option>
          <option value="tomorrow">Morgen</option>
          <option value="weekend">Wochenende</option>
          <option value="week">Diese Woche</option>
        </select>
      </div>
    </div>
    <div class="ftags" id="ftags">
      <button class="ftag on" onclick="setF(this,'all')">Alle <span class="n" id="n-all">0</span></button>
      <button class="ftag" onclick="setF(this,'hot')">🔥 Top <span class="n" id="n-hot">0</span></button>
      <button class="ftag" onclick="setF(this,'con')">🤝 Konsens <span class="n" id="n-con">0</span></button>
      <button class="ftag" onclick="setF(this,'upset')">⚡ Außenseiter <span class="n" id="n-up">0</span></button>
      <button class="ftag" onclick="setF(this,'skip')">⚠️ Vorsicht <span class="n" id="n-skip">0</span></button>
    </div>
    <button class="btn" id="btn" onclick="load()">🔄 Neu laden</button>
  </div>

  <div class="pbar" id="pbar"><div class="pfill" id="pfill" style="width:0%"></div></div>
  <div class="pst" id="pst"></div>

  <div id="picks-wrap" style="display:none">
    <div class="sec">🔥 Top Empfehlungen</div>
    <div id="picks"></div>
  </div>
  <div id="warn-wrap" style="display:none">
    <div class="sec">⚠️ Vorsicht – heute meiden</div>
    <div id="warns"></div>
  </div>

  <div class="sec">Alle Spiele – nach Analyse-Score</div>
  <div id="content"><div class="loading"><div class="spin"></div><p>Lade Spiele…</p></div></div>
  <div class="disc">⚠️ Analyse basiert auf Quoten-Mathematik & Kontext. Kein Tipp garantiert. Hilfe: <strong>bzga.de</strong></div>
</main>

<script>
const KEY='fdd253aa73b4a938b3f9746867696e87';
const LEAGUES=[
  {key:'soccer_germany_bundesliga',label:'Bundesliga'},
  {key:'soccer_germany_bundesliga2',label:'2. Bundesliga'},
  {key:'soccer_germany_bundesliga_relegation',label:'BL Relegation'},
  {key:'soccer_epl',label:'Premier League'},
  {key:'soccer_spain_la_liga',label:'La Liga'},
  {key:'soccer_italy_serie_a',label:'Serie A'},
  {key:'soccer_france_ligue_one',label:'Ligue 1'},
  {key:'soccer_uefa_champs_league',label:'Champions League'},
  {key:'soccer_uefa_europa_league',label:'Europa League'},
  {key:'soccer_uefa_europa_conference_league',label:'Conference League'},
];

let games=[], fMode='all', expanded=null;

function p(pct){document.getElementById('pfill').style.width=pct+'%';}
function st(t){document.getElementById('pst').textContent=t;}
function oP(o){return o>1?1/o:0;}
function isToday(d){return d.toDateString()===new Date().toDateString();}
function isTomorrow(d){const t=new Date();t.setDate(t.getDate()+1);return d.toDateString()===t.toDateString();}

// Test which proxy works and remember it
let goodProxy=null;
const PROXIES=[
  u=>`https://api.allorigins.win/raw?url=${encodeURIComponent(u)}`,
  u=>`https://corsproxy.io/?url=${encodeURIComponent(u)}`,
  u=>`https://thingproxy.freeboard.io/fetch/${u}`,
  u=>`https://yacdn.org/proxy/${u}`,
];

async function tryFetch(proxyFn, url){
  try{
    const ctrl=new AbortController();
    setTimeout(()=>ctrl.abort(),5000);
    const r=await fetch(proxyFn(url),{signal:ctrl.signal});
    if(!r.ok) return null;
    const j=await r.json();
    return Array.isArray(j)?j:null;
  }catch(e){return null;}
}

async function findWorkingProxy(){
  // Test with a simple known-working endpoint
  const testUrl=`https://api.the-odds-api.com/v4/sports/?apiKey=${KEY}`;
  st('Suche besten Proxy…');
  for(let i=0;i<PROXIES.length;i++){
    const r=await tryFetch(PROXIES[i],testUrl);
    if(r){goodProxy=i;st('');return true;}
  }
  return false;
}

async function fetchOne(url){
  // Use known good proxy first
  if(goodProxy!==null){
    const r=await tryFetch(PROXIES[goodProxy],url);
    if(r) return r;
    goodProxy=null; // Reset if it stopped working
  }
  // Try all
  for(let i=0;i<PROXIES.length;i++){
    const r=await tryFetch(PROXIES[i],url);
    if(r){goodProxy=i;return r;}
  }
  return null;
}

function analyze(game,leagueLabel,leagueKey){
  const bms=game.bookmakers||[];
  const bm=bms[0];if(!bm)return null;
  const h2h=bm.markets?.find(m=>m.key==='h2h');if(!h2h)return null;
  const hO=h2h.outcomes.find(o=>o.name===game.home_team);
  const aO=h2h.outcomes.find(o=>o.name===game.away_team);
  const dO=h2h.outcomes.find(o=>o.name==='Draw');
  if(!hO||!aO)return null;

  const rH=oP(hO.price),rD=dO?oP(dO.price):0,rA=oP(aO.price);
  const tot=rH+rD+rA;if(!tot)return null;
  const pH=rH/tot,pD=rD/tot,pA=rA/tot;
  const vig=Math.round((tot-1)*100);
  const d=new Date(game.commence_time);
  const mo=d.getMonth()+1, dy=d.getDate();

  // ── KONTEXT ──────────────────────────────────────────
  const isEuro=leagueKey.includes('europa')||leagueKey.includes('champs');
  const isRelegation=leagueKey.includes('relegation');
  const isSeasonEnd=(mo===5&&dy>=15)||mo===6;
  const isLastDay=isSeasonEnd&&!isEuro&&!isRelegation; // Liga-Saisonende OHNE Entscheidungsspiele
  const isKnockout=isEuro&&isSeasonEnd; // Europacup K.O./Finale

  // Entscheidungsspiel-Erkennung: Relegation ODER letzter Spieltag mit engem Score
  // Bei Relegation: maximale Motivation, totaler Druck – kein Rotations-Risk
  const isDecisive=isRelegation||isKnockout;

  // ── KONSENS (mehrere Buchmacher) ──────────────────────
  let consensus=null;
  if(bms.length>=2){
    const hArr=[],aArr=[],bmD=[];
    bms.forEach(b=>{
      const m=b.markets?.find(m=>m.key==='h2h');if(!m)return;
      const h=m.outcomes.find(o=>o.name===game.home_team);
      const a=m.outcomes.find(o=>o.name===game.away_team);
      const dr=m.outcomes.find(o=>o.name==='Draw');
      if(!h||!a)return;
      hArr.push(h.price);aArr.push(a.price);
      bmD.push({name:b.title,h:h.price,a:a.price,d:dr?.price});
    });
    if(hArr.length>=2){
      const sp=arr=>Math.max(...arr)-Math.min(...arr);
      const maxSp=Math.max(sp(hArr),sp(aArr));
      consensus={
        ok:maxSp<0.20,uncertain:maxSp>0.45,
        spread:maxSp.toFixed(2),count:hArr.length,
        details:bmD.slice(0,4),
        bestH:Math.max(...hArr),bestA:Math.max(...aArr),
      };
    }
  }

  const sigs=[];
  let score=0;

  // 1. RELEGATIONSSPIEL – spezielle Statistik-Regeln
  if(isRelegation){
    sigs.push({ico:'🔥',name:'Relegationsspiel – Totaler Druck',
      desc:'Auf- oder Abstieg auf dem Spiel. Maximale Motivation, keine Rotation. Historisch: ~35% enden Unentschieden da beide Teams extrem vorsichtig spielen.',
      str:'h',type:'boost'});
    score+=20;

    // Statistik: Unentschieden in Relegation deutlich häufiger
    // Auswärtsteam spielt defensiver → Heimvorteil schwächer
    if(dO&&pD>0.20){
      sigs.push({ico:'🤝',name:'Unentschieden statistisch wahrscheinlich',
        desc:`Relegationsspiele enden historisch in ~35% Unentschieden (Liga-Schnitt: ~25%). Quote ${dO.price.toFixed(2)} könnte Value sein. Auswärtsteam spielt oft auf Absicherung.`,
        str:'m',type:'draw'});
      score+=10;
    }

    // Auswärtsteam unter Druck spielt defensiver → Heimvorteil relativiert
    if(pH>0.50){
      sigs.push({ico:'🏟️',name:'Heimvorteil relativiert',
        desc:'Bei Relegation spielt das Auswärtsteam oft extrem defensiv und auf Konter. Heimfavorit hat es schwerer als die Quote suggeriert.',
        str:'m',type:'context'});
      score-=8;
    }
  }

  // 2. EUROPACUP FINALE/K.O.
  if(isKnockout){
    sigs.push({ico:'🏆',name:'Europacup K.O./Finale',
      desc:'Alles oder nichts – maximale Motivation. Historisch: K.O.-Spiele enden häufiger torarm und ausgeglichen als Ligaspiele.',
      str:'h',type:'boost'});
    score+=20;

    // K.O. Spiele: weniger Tore, mehr Taktik
    sigs.push({ico:'🛡️',name:'Taktisches Spiel erwartet',
      desc:'In K.O.-Spielen spielen beide Teams defensiver. Über 2.5 Tore statistisch seltener als in Ligaspielen (~42% statt ~55%).',
      str:'m',type:'context'});
  }

  // 3. SAISONENDE-WARNUNG (NUR bedeutungslose Ligaspiele)
  if(isLastDay){
    sigs.push({ico:'📅',name:'Bedeutungsloses Saisonende-Spiel',
      desc:'Letzter Spieltag ohne Entscheidungscharakter: Rotation wahrscheinlich, Motivation reduziert. Historisch: Außenseiter-Ergebnisse häufiger als sonst.',
      str:'warn',type:'warn'});
    score-=25;

    // Favorit besonders unzuverlässig bei bedeutungslosem Saisonende
    if(favOdds<1.60){
      sigs.push({ico:'⚠️',name:'Niedriger Favorit – erhöhtes Risiko',
        desc:`Quote ${favOdds.toFixed(2)} sehr niedrig aber Team ohne Motivation rotiert oft. Historisch: Hohe Favoriten verlieren am letzten bedeutungslosen Spieltag in ~30% der Fälle.`,
        str:'warn',type:'warn'});
      score-=15;
    }
  }

  // 3. BUCHMACHER-KONSENS
  if(consensus?.ok){
    sigs.push({ico:'🤝',name:`Starker Konsens (${consensus.count} Buchmacher)`,
      desc:`Alle ${consensus.count} Buchmacher einig – Spread nur ${consensus.spread}. Sehr verlässliches Signal.`,
      str:'h',type:'con'});
    score+=30;
  } else if(consensus?.uncertain){
    sigs.push({ico:'❓',name:'Buchmacher uneinig',
      desc:`Großer Quotenunterschied (Spread: ${consensus.spread}). Markt unsicher – Vorsicht!`,
      str:'warn',type:'warn'});
    score-=15;
  }

  // 4. RISIKO-FAVORIT: sehr niedrig aber Unentschieden realistisch
  const favOdds=Math.min(hO.price,aO.price);
  const isHeavyFav=favOdds<1.50;
  if(isHeavyFav&&dO&&pD>0.22){
    sigs.push({ico:'⚠️',name:'Risiko-Favorit',
      desc:`Quote ${favOdds.toFixed(2)} sehr niedrig, aber Unentschieden hat ${Math.round(pD*100)}% Wahrscheinlichkeit. Bei letztem Spieltag besonders gefährlich!`,
      str:'warn',type:'warn'});
    score-=20;
  }

  // 5. AUSSENSEITER-SIGNAL
  const under=pH<pA?{name:game.home_team,odds:hO.price,prob:pH}:{name:game.away_team,odds:aO.price,prob:pA};
  const isUpset=under.odds>2.0&&under.odds<3.8&&under.prob>0.26&&Math.abs(pH-pA)<0.28;
  if(isUpset){
    sigs.push({ico:'⚡',name:'Außenseiter-Signal',
      desc:`${under.name} (Quote ${under.odds.toFixed(2)}) hat laut Quoten-Mathematik ${Math.round(under.prob*100)}% Wahrscheinlichkeit trotz Außenseiter-Rolle.`,
      str:'m',type:'upset'});
    score+=20;
  }

  // 6. FAIRE QUOTEN
  if(vig<=3){
    sigs.push({ico:'📊',name:'Sehr faire Quoten',
      desc:`Buchmacher-Marge nur ${vig}%. Quoten spiegeln echte Wahrscheinlichkeit sehr genau wider.`,
      str:'m',type:'quality'});
    score+=12;
  }

  // 7. BESTE QUOTE verfügbar
  if(consensus&&consensus.bestH>hO.price*1.06){
    sigs.push({ico:'💰',name:'Bessere Quote verfügbar',
      desc:`Heimsieg-Quote bis zu ${consensus.bestH.toFixed(2)} bei anderen Buchmachern (vs. ${hO.price.toFixed(2)} hier).`,
      str:'m',type:'value'});
    score+=8;
  }

  if(!sigs.length){
    const fav=pH>=pA?{name:game.home_team,odds:hO.price,prob:pH}:{name:game.away_team,odds:aO.price,prob:pA};
    sigs.push({ico:'📈',name:'Klarer Favorit',
      desc:`${fav.name} mit ${Math.round(fav.prob*100)}% Wahrscheinlichkeit. Quote ${fav.odds.toFixed(2)}.`,
      str:'l',type:'std'});
    score+=Math.round(fav.prob*40);
  }

  const isSkip=score<-10;
  const isHot=score>=35;
  const isCon=consensus?.ok||false;
  const tags=[];
  if(isRelegation) tags.push({l:'🔥 Relegation',c:'tag-hot'});
  if(isKnockout) tags.push({l:'🏆 K.O.-Spiel',c:'tag-hot'});
  if(isLastDay) tags.push({l:'📅 Bedeutungslos',c:'tag-warn'});
  if(isCon) tags.push({l:`🤝 Konsens`,c:'tag-good'});
  if(isUpset) tags.push({l:'⚡ Außenseiter',c:'tag-hot'});
  if(isSkip) tags.push({l:'⚠️ Vorsicht',c:'tag-warn'});
  if(vig<=3) tags.push({l:'📊 Faire Quote',c:'tag-good'});

  const fav=pH>=pA?{name:game.home_team,odds:hO.price}:{name:game.away_team,odds:aO.price};
  const tip=isSkip?'⚠️ Besser überspringen':isUpset?`${under.name} gewinnt`:`${fav.name} gewinnt`;
  const tipOdds=isUpset?under.odds:fav.odds;

  const scBadge=score>=35?`🔥 ${score}`:score>=15?`✅ ${score}`:score>=0?`📊 ${score}`:`⚠️ ${score}`;
  const scCls=score>=35?'sc-hot':score>=15?'sc-good':score>=0?'sc-cool':'sc-skip';
  const scColor=score>=35?'#ffd600':score>=15?'#00e676':score>=0?'#6a8f6a':'#ff5722';

  return{
    id:game.id,match:`${game.home_team} vs ${game.away_team}`,
    home:game.home_team,away:game.away_team,
    leagueLabel,leagueKey,date:d,
    today:isToday(d),tomorrow:isTomorrow(d),
    time:`${d.toLocaleDateString('de-DE',{weekday:'short',day:'2-digit',month:'2-digit'})} ${d.toLocaleTimeString('de-DE',{hour:'2-digit',minute:'2-digit'})}`,
    tip,tipOdds,sigs,tags,score,scBadge,scCls,scColor,
    isHot,isSkip,isUpset,isCon,isLastDay,isKnockout,
    hOdds:hO.price,aOdds:aO.price,dOdds:dO?.price,
    pH:Math.round(pH*100),pD:Math.round(pD*100),pA:Math.round(pA*100),
    vig,consensus,bm:bm.title,bmCount:bms.length,
    skipReason:isLastDay?'Bedeutungsloses Saisonende-Spiel – Rotation wahrscheinlich':consensus?.uncertain?'Buchmacher uneinig':'',
  };
}

async function load(){
  document.getElementById('btn').disabled=true;
  document.getElementById('picks-wrap').style.display='none';
  document.getElementById('warn-wrap').style.display='none';
  document.getElementById('content').innerHTML='<div class="loading"><div class="spin"></div><p id="lst">Suche Verbindung…</p></div>';
  document.getElementById('pbar').classList.add('show');
  p(0);st('');
  games=[];goodProxy=null;

  // Find working proxy first
  const ok=await findWorkingProxy();
  if(!ok){
    document.getElementById('content').innerHTML='<div class="empty">⚠️ Keine Verbindung möglich. Bitte WLAN prüfen und neu laden.</div>';
    document.getElementById('btn').disabled=false;
    document.getElementById('pbar').classList.remove('show');
    return;
  }
  const sel=document.getElementById('f-league');
  sel.innerHTML='<option value="all">Alle Ligen</option>';

  const deadline=Date.now()+25000; // Hard 25 second total limit

  for(let i=0;i<LEAGUES.length;i++){
    // Stop if we've used up total time
    if(Date.now()>deadline){
      st('⏱ Zeitlimit erreicht – zeige geladene Spiele');
      break;
    }

    const lg=LEAGUES[i];
    const lmsg=document.getElementById('lst');
    if(lmsg) lmsg.textContent=`Lade ${lg.label}… (${i+1}/${LEAGUES.length})`;
    p(Math.round(i/LEAGUES.length*90));

    const url=`https://api.the-odds-api.com/v4/sports/${lg.key}/odds/?apiKey=${KEY}&regions=eu&markets=h2h&oddsFormat=decimal`;
    const data=await fetchOne(url);
    if(!data||!data.length) continue;

    const opt=document.createElement('option');
    opt.value=lg.key;opt.textContent=lg.label;sel.appendChild(opt);
    data.forEach(g=>{const r=analyze(g,lg.label,lg.key);if(r)games.push(r);});

    // Show partial results immediately
    render();
  }

  p(100);st('');
  setTimeout(()=>document.getElementById('pbar').classList.remove('show'),500);
  document.getElementById('btn').disabled=false;
  render();
}

function getFiltered(){
  const lg=document.getElementById('f-league').value;
  const wh=document.getElementById('f-when').value;
  return games.filter(g=>{
    if(lg!=='all'&&g.leagueKey!==lg)return false;
    if(wh==='today'&&!g.today)return false;
    if(wh==='tomorrow'&&!g.tomorrow)return false;
    if(wh==='weekend'){const d=g.date.getDay();if(d!==0&&d!==6)return false;}
    if(wh==='week'){const n=new Date(),e=new Date();e.setDate(e.getDate()+7);if(g.date<n||g.date>e)return false;}
    return true;
  });
}

function render(){
  const all=getFiltered().sort((a,b)=>{
    if(a.today&&!b.today)return -1;
    if(!a.today&&b.today)return 1;
    if(a.isSkip&&!b.isSkip)return 1;
    if(!a.isSkip&&b.isSkip)return -1;
    return b.score-a.score;
  });

  const hot=all.filter(g=>g.isHot);
  const con=all.filter(g=>g.isCon);
  const up=all.filter(g=>g.isUpset);
  const skip=all.filter(g=>g.isSkip);

  document.getElementById('n-all').textContent=all.length;
  document.getElementById('n-hot').textContent=hot.length;
  document.getElementById('n-con').textContent=con.length;
  document.getElementById('n-up').textContent=up.length;
  document.getElementById('n-skip').textContent=skip.length;
  document.getElementById('s-total').textContent=games.length;
  document.getElementById('s-hot').textContent=games.filter(g=>g.isHot).length;
  document.getElementById('s-skip').textContent=games.filter(g=>g.isSkip).length;
  document.getElementById('s-con').textContent=games.filter(g=>g.isCon).length;

  // Top picks – beste 3 insgesamt
  const picks=all.filter(g=>!g.isSkip).slice(0,3);
  const pw=document.getElementById('picks-wrap');
  const pd=document.getElementById('picks');
  if(picks.length){
    pw.style.display='block';
    pd.innerHTML=picks.map((g,i)=>{
      const t=g.isHot?'hot':'good';
      const tl=g.isHot?'🔥 Top Pick':'✅ Empfehlung';
      const topSig=g.sigs.find(s=>s.type!=='warn')||g.sigs[0];
      return `<div class="pick ${t}">
        <div class="pnum">${i+1}</div>
        <div class="pbody">
          <div class="ptyp ${t}">${tl} · Score ${g.score}</div>
          <div class="pmatch">${g.match}</div>
          <div class="ptip ${t}">✅ ${g.tip}</div>
          <div class="pinfo">${g.leagueLabel}${g.today?' · HEUTE':g.tomorrow?' · MORGEN':''} · ${g.time}<br>${topSig.ico} ${topSig.desc.slice(0,85)}…</div>
        </div>
        <div class="pright"><div class="podds">${g.tipOdds.toFixed(2)}</div><div class="pbm">${g.bmCount} BM</div></div>
      </div>`;
    }).join('');
  } else pw.style.display='none';

  // Warnings (only today's skip games)
  const todaySkip=skip.filter(g=>g.today||g.tomorrow).slice(0,3);
  const ww=document.getElementById('warn-wrap');
  if(todaySkip.length){
    ww.style.display='block';
    document.getElementById('warns').innerHTML=todaySkip.map(g=>`
      <div class="warnbox">
        <div class="warnbox-icon">⚠️</div>
        <div class="warnbox-body"><strong>${g.match}</strong><p>${g.skipReason||'Analyse empfiehlt Vorsicht bei diesem Spiel.'}</p></div>
      </div>`).join('');
  } else ww.style.display='none';

  // Filtered list
  let list=all;
  if(fMode==='hot')list=hot;
  else if(fMode==='con')list=con;
  else if(fMode==='upset')list=up;
  else if(fMode==='skip')list=skip;

  const c=document.getElementById('content');
  if(!games.length){c.innerHTML='<div class="empty">Keine Daten geladen. Neu laden versuchen.</div>';return;}
  if(!list.length){c.innerHTML='<div class="empty">Keine Spiele für diese Filter.</div>';return;}

  c.innerHTML='';
  const div=document.createElement('div');div.className='list';
  list.forEach((g,i)=>{
    const tagsH=g.tags.map(t=>`<span class="tag ${t.c}">${t.l}</span>`).join('');
    const sigsH=g.sigs.map(s=>`<div class="sig">
      <div class="sigico">${s.ico}</div>
      <div class="sigb"><div class="sign">${s.name}</div><div class="sigd">${s.desc}</div></div>
      <div class="sigstr str-${s.str}">${s.str==='warn'?'⚠️':s.str==='h'?'★★★':s.str==='m'?'★★':'★'}</div>
    </div>`).join('');

    const o3=`<div class="odds3">
      <div class="ob${g.pH>=g.pA&&g.pH>=g.pD?' best':''}"><div class="obl">Heim</div><div class="obv">${g.hOdds.toFixed(2)}</div><div class="obp">${g.pH}%</div></div>
      ${g.dOdds?`<div class="ob"><div class="obl">Unentsch.</div><div class="obv">${g.dOdds.toFixed(2)}</div><div class="obp">${g.pD}%</div></div>`:'<div></div>'}
      <div class="ob${g.pA>g.pH&&g.pA>=g.pD?' best':''}"><div class="obl">Auswärts</div><div class="obv">${g.aOdds.toFixed(2)}</div><div class="obp">${g.pA}%</div></div>
    </div>`;

    const bmH=g.consensus?.details?.length>1?`
      <div class="xt">🤝 Buchmacher-Vergleich</div>
      ${g.consensus.details.map(b=>`<div class="bmrow"><span class="bml">${b.name}</span><span>H ${b.h.toFixed(2)}${b.d?` X ${b.d.toFixed(2)}`:''} A ${b.a.toFixed(2)}</span></div>`).join('')}
      <div style="font-size:11px;color:var(--m);margin-top:5px">Spread: ${g.consensus.spread} · ${g.consensus.ok?'✅ Einigkeit':'❓ Uneinigkeit'}</div>`:'';

    const el=document.createElement('div');
    el.className=`card${g.isSkip?' danger':''}`;
    el.style.animationDelay=(i*0.04)+'s';
    el.onclick=()=>{expanded=expanded===g.id?null:g.id;render();};
    el.innerHTML=`
      <div class="sbar" style="background:linear-gradient(90deg,${g.scColor} ${Math.max(0,g.score)}%,var(--d4) ${Math.max(0,g.score)}%)"></div>
      <div class="ch">
        <div class="cm">
          <div class="cmatch">${g.match}</div>
          <div class="csub">
            <span class="cleague">${g.leagueLabel}</span>
            ${g.today?'<span class="bt bt-today">HEUTE</span>':g.tomorrow?'<span class="bt bt-tomorrow">MORGEN</span>':''}
            ${g.isSkip?'<span class="bt bt-warn">⚠️ VORSICHT</span>':''}
            <span class="ctime">🕐 ${g.time}</span>
          </div>
          <div class="tags">${tagsH}</div>
        </div>
        <div class="cr">
          <span class="cscore ${g.scCls}">${g.scBadge}</span>
          <span class="codds">${g.tipOdds.toFixed(2)}</span>
          <span class="cbm">${g.bmCount} BM</span>
        </div>
      </div>
      <div class="cx">
        <div class="xt">🔍 Analyse-Signale</div>
        ${sigsH}
        <div class="xt">📊 Quoten</div>
        ${o3}
        ${bmH}
        <div class="rec">
          <div>
            <div class="rect" style="color:${g.isSkip?'var(--or)':'var(--g)'}">${g.isSkip?'⚠️ Besser überspringen':'✅ '+g.tip}</div>
            <div class="recs">Score: ${g.score} · Marge: ${g.vig}% · ${g.bmCount} Buchmacher</div>
          </div>
          <div class="reco">${g.tipOdds.toFixed(2)}</div>
        </div>
      </div>`;
    if(expanded===g.id) el.classList.add('open');
    div.appendChild(el);
  });
  c.appendChild(div);
}

function setF(btn,mode){
  document.querySelectorAll('.ftag').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');fMode=mode;render();
}

load();
</script>
