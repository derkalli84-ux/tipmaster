<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TipMaster Pro</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;900&family=Barlow:wght@400;600&display=swap" rel="stylesheet">
<style>
:root{--g:#00e676;--gold:#ffd600;--red:#ff1744;--or:#ff8a65;--dark:#0a0f0a;--d2:#111811;--d3:#1a221a;--d4:#222e22;--b:#2a3a2a;--t:#e8f5e9;--m:#6a8f6a;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--dark);color:var(--t);font-family:'Barlow',sans-serif;min-height:100vh;}
header{background:linear-gradient(135deg,#0d1a0d,#0a1a00);border-bottom:2px solid var(--g);padding:0 16px;}
.hi{max-width:800px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;height:54px;}
.logo{font-family:'Barlow Condensed';font-weight:900;font-size:22px;color:var(--g);text-transform:uppercase;}
.logo b{color:var(--gold);}
main{max-width:800px;margin:0 auto;padding:16px 12px 60px;}

.btn{background:rgba(0,230,118,.1);border:1px solid var(--g);color:var(--g);font-family:'Barlow';font-size:14px;font-weight:600;padding:12px;border-radius:8px;cursor:pointer;width:100%;margin-bottom:12px;}
.btn:disabled{opacity:.4;cursor:not-allowed;}

.pbar{height:3px;background:var(--d4);border-radius:2px;margin-bottom:6px;}
.pfill{height:100%;background:var(--g);border-radius:2px;transition:width .4s;}
.pst{font-size:12px;color:var(--m);text-align:center;margin-bottom:16px;}

/* TOP PICKS */
.sec{font-family:'Barlow Condensed';font-weight:700;font-size:13px;letter-spacing:3px;text-transform:uppercase;color:var(--m);margin:16px 0 10px;display:flex;align-items:center;gap:8px;}
.sec::after{content:'';flex:1;height:1px;background:var(--b);}

.pick{border-radius:12px;padding:14px 15px;margin-bottom:10px;display:flex;gap:12px;align-items:flex-start;border:1px solid rgba(0,230,118,.3);background:linear-gradient(135deg,#001a0a,#111811);}
.pick.hot{border-color:rgba(255,214,0,.4);background:linear-gradient(135deg,#1a1200,#111811);}
.pick.warn{border-color:rgba(255,87,34,.3);background:rgba(255,87,34,.03);}
.pnum{font-family:'Barlow Condensed';font-weight:900;font-size:28px;color:rgba(255,255,255,.1);flex-shrink:0;width:24px;line-height:1;}
.pbody{flex:1;}
.ptyp{font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:3px;color:var(--g);}
.ptyp.hot{color:var(--gold);}
.ptyp.warn{color:var(--or);}
.pmatch{font-family:'Barlow Condensed';font-weight:700;font-size:15px;margin-bottom:2px;}
.ptip{font-size:13px;font-weight:600;color:var(--g);margin-bottom:3px;}
.ptip.hot{color:var(--gold);}
.pinfo{font-size:11px;color:var(--m);line-height:1.5;}
.pright{text-align:right;flex-shrink:0;}
.podds{font-family:'Barlow Condensed';font-weight:900;font-size:24px;color:var(--gold);}
.pbm{font-size:10px;color:var(--m);}

/* WARN BOX */
.wbox{background:rgba(255,87,34,.07);border:1px solid rgba(255,87,34,.2);border-radius:10px;padding:11px 13px;margin-bottom:10px;font-size:12px;color:#ffccbc;line-height:1.5;}
.wbox strong{color:var(--or);display:block;margin-bottom:2px;font-size:13px;}

/* CARDS */
.list{display:flex;flex-direction:column;gap:10px;}
.card{background:var(--d2);border:1px solid var(--b);border-radius:12px;overflow:hidden;cursor:pointer;transition:border-color .2s;}
.card:hover{border-color:rgba(0,230,118,.3);}
.card.open{border-color:var(--g);}
.card.danger{border-color:rgba(255,87,34,.25);}
.sbar{height:3px;}
.ch{padding:13px 14px;display:grid;grid-template-columns:1fr auto;gap:10px;align-items:start;}
.cmatch{font-family:'Barlow Condensed';font-weight:700;font-size:15px;line-height:1.2;margin-bottom:3px;}
.csub{font-size:11px;color:var(--m);margin-bottom:4px;}
.tags{display:flex;gap:4px;flex-wrap:wrap;}
.tag{font-size:10px;font-weight:700;padding:2px 7px;border-radius:10px;}
.tag-hot{background:rgba(255,214,0,.12);color:var(--gold);}
.tag-good{background:rgba(0,230,118,.1);color:var(--g);}
.tag-warn{background:rgba(255,87,34,.1);color:var(--or);}
.tag-blue{background:rgba(100,181,246,.1);color:#64b5f6;}
.cr{display:flex;flex-direction:column;align-items:flex-end;gap:4px;flex-shrink:0;}
.cscore{font-family:'Barlow Condensed';font-weight:900;font-size:12px;padding:3px 8px;border-radius:6px;}
.sc-hot{background:rgba(255,214,0,.15);color:var(--gold);}
.sc-good{background:rgba(0,230,118,.12);color:var(--g);}
.sc-ok{background:rgba(100,181,246,.1);color:#64b5f6;}
.sc-skip{background:rgba(255,87,34,.1);color:var(--or);}
.codds{font-family:'Barlow Condensed';font-weight:900;font-size:21px;color:var(--gold);line-height:1;}
.cbm{font-size:10px;color:var(--m);}

.cx{border-top:1px solid var(--b);background:var(--d3);max-height:0;overflow:hidden;transition:max-height .35s ease;}
.card.open .cx{max-height:600px;padding:14px;}
.xt{font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--m);margin:10px 0 6px;}
.xt:first-child{margin-top:0;}
.sig{background:var(--d4);border-radius:8px;padding:9px 11px;margin-bottom:5px;display:flex;gap:9px;}
.sigi{font-size:14px;flex-shrink:0;}
.sign{font-size:12px;font-weight:700;margin-bottom:1px;}
.sigd{font-size:12px;color:var(--m);line-height:1.5;}
.odds3{display:flex;gap:6px;margin-bottom:10px;}
.ob{flex:1;background:var(--d4);border:1px solid var(--b);border-radius:8px;padding:9px;text-align:center;}
.ob.best{border-color:var(--g);}
.obl{font-size:10px;color:var(--m);margin-bottom:2px;}
.obv{font-family:'Barlow Condensed';font-weight:900;font-size:17px;color:var(--gold);}
.obp{font-size:11px;color:var(--m);}
.bml{font-size:12px;color:var(--m);padding:3px 0;border-bottom:1px solid var(--d4);}
.bml:last-child{border:none;}
.bml span{float:right;color:var(--t);font-weight:600;}
.rec{background:rgba(0,230,118,.07);border:1px solid rgba(0,230,118,.2);border-radius:10px;padding:11px 13px;display:flex;align-items:center;gap:12px;margin-top:4px;}
.rect{font-family:'Barlow Condensed';font-weight:700;font-size:15px;flex:1;}
.reco{font-family:'Barlow Condensed';font-weight:900;font-size:24px;color:var(--gold);}
.recs{font-size:11px;color:var(--m);}
.empty{text-align:center;padding:40px;color:var(--m);font-size:14px;}
.disc{margin-top:20px;padding:10px 14px;background:rgba(255,23,68,.06);border:1px solid rgba(255,23,68,.15);border-radius:8px;font-size:11px;color:#e57373;text-align:center;line-height:1.5;}
.filter-row{display:flex;gap:8px;margin-bottom:12px;}
.fsel{background:var(--d3);border:1px solid var(--b);color:var(--t);font-family:'Barlow';font-size:13px;padding:7px 10px;border-radius:7px;flex:1;outline:none;}
</style>
</head>
<body>
<header><div class="hi"><div class="logo">⚽ Tip<b>Master</b> Pro</div><span style="font-size:11px;color:var(--m)">🔍 Smart Analyse</span></div></header>
<main>

<button class="btn" id="btn" onclick="load()">🔄 Tipps laden</button>
<div class="pbar"><div class="pfill" id="pf" style="width:0%"></div></div>
<div class="pst" id="pst"></div>

<div class="filter-row">
  <select class="fsel" id="f-league" onchange="render()"><option value="all">Alle Ligen</option></select>
  <select class="fsel" id="f-when" onchange="render()">
    <option value="all">Alle anstehenden</option>
    <option value="today">Heute</option>
    <option value="tomorrow">Morgen</option>
    <option value="weekend">Wochenende</option>
  </select>
</div>

<div id="picks-wrap" style="display:none">
  <div class="sec">🔥 Top Empfehlungen</div>
  <div id="picks"></div>
</div>
<div id="warn-wrap" style="display:none">
  <div class="sec">⚠️ Heute meiden</div>
  <div id="warns"></div>
</div>
<div class="sec">Alle Spiele</div>
<div id="content"><div class="empty">Tippe auf "Tipps laden"</div></div>
<div class="disc">⚠️ Analyse basiert auf Quoten & Statistik. Kein Tipp garantiert. Hilfe: bzga.de</div>
</main>

<script>
const KEY='fdd253aa73b4a938b3f9746867696e87';
const LEAGUES=[
  {key:'soccer_germany_bundesliga',label:'Bundesliga'},
  {key:'soccer_germany_bundesliga2',label:'2. Bundesliga'},
  {key:'soccer_germany_bundesliga_relegation',label:'BL Relegation'},
  {key:'soccer_epl',label:'Premier League'},
  {key:'soccer_spain_la_liga',label:'La Liga'},
  {key:'soccer_italy_serie_a',label:'Serie A'},
  {key:'soccer_france_ligue_one',label:'Ligue 1'},
  {key:'soccer_uefa_champs_league',label:'Champions League'},
  {key:'soccer_uefa_europa_league',label:'Europa League'},
  {key:'soccer_uefa_europa_conference_league',label:'Conference League'},
];

const PROXY=u=>`https://api.allorigins.win/raw?url=${encodeURIComponent(u)}`;
let games=[],exp=null;

function oP(o){return o>1?1/o:0;}
function isToday(d){return d.toDateString()===new Date().toDateString();}
function isTomorrow(d){const t=new Date();t.setDate(t.getDate()+1);return d.toDateString()===t.toDateString();}

async function fetchLeague(lg){
  const url=`https://api.the-odds-api.com/v4/sports/${lg.key}/odds/?apiKey=${KEY}&regions=eu&markets=h2h&oddsFormat=decimal`;
  try{
    const ctrl=new AbortController();
    setTimeout(()=>ctrl.abort(),6000);
    const r=await fetch(PROXY(url),{signal:ctrl.signal});
    if(!r.ok) return null;
    const j=await r.json();
    return Array.isArray(j)?j:null;
  }catch(e){return null;}
}

function analyze(game,lg){
  const bms=game.bookmakers||[];
  const bm=bms[0];if(!bm)return null;
  const h2h=bm.markets?.find(m=>m.key==='h2h');if(!h2h)return null;
  const hO=h2h.outcomes.find(o=>o.name===game.home_team);
  const aO=h2h.outcomes.find(o=>o.name===game.away_team);
  const dO=h2h.outcomes.find(o=>o.name==='Draw');
  if(!hO||!aO)return null;
  const rH=oP(hO.price),rD=dO?oP(dO.price):0,rA=oP(aO.price);
  const tot=rH+rD+rA;if(!tot)return null;
  const pH=rH/tot,pD=rD/tot,pA=rA/tot;
  const vig=Math.round((tot-1)*100);
  const d=new Date(game.commence_time);
  const mo=d.getMonth()+1,dy=d.getDate();

  const isEuro=lg.key.includes('europa')||lg.key.includes('champs');
  const isRel=lg.key.includes('relegation');
  const isSeasonEnd=(mo===5&&dy>=15)||mo===6;
  const isLastDay=isSeasonEnd&&!isEuro&&!isRel;
  const isKO=isEuro&&isSeasonEnd;

  // Konsens
  let con=null;
  if(bms.length>=2){
    const hA=[],aA=[],det=[];
    bms.forEach(b=>{
      const m=b.markets?.find(m=>m.key==='h2h');if(!m)return;
      const h=m.outcomes.find(o=>o.name===game.home_team);
      const a=m.outcomes.find(o=>o.name===game.away_team);
      const dr=m.outcomes.find(o=>o.name==='Draw');
      if(!h||!a)return;
      hA.push(h.price);aA.push(a.price);
      det.push({n:b.title,h:h.price,a:a.price,d:dr?.price});
    });
    if(hA.length>=2){
      const sp=arr=>Math.max(...arr)-Math.min(...arr);
      const ms=Math.max(sp(hA),sp(aA));
      con={ok:ms<0.20,unc:ms>0.45,sp:ms.toFixed(2),cnt:hA.length,det:det.slice(0,3)};
    }
  }

  const sigs=[];let score=0;

  // Relegation
  if(isRel){
    sigs.push({i:'🔥',n:'Relegationsspiel',d:'Auf-/Abstieg auf dem Spiel. Keine Rotation, maximale Motivation. Historisch ~35% Unentschieden.',c:'hot'});
    score+=20;
    if(dO&&pD>0.20){
      sigs.push({i:'🤝',n:'Unentschieden statistisch wahrscheinlich',d:`Relegationen enden oft Unentschieden (~35%). Quote ${dO.price.toFixed(2)} könnte Value sein.`,c:'good'});
      score+=10;
    }
    if(pH>0.50){
      sigs.push({i:'🏟️',n:'Heimvorteil relativiert',d:'Auswärtsteam spielt defensiv auf Konter. Favorit hat es schwerer als Quote suggeriert.',c:'neu'});
      score-=5;
    }
  }

  // K.O.
  if(isKO){
    sigs.push({i:'🏆',n:'Europacup K.O./Finale',d:'Maximale Motivation, kein zweites Spiel. Historisch weniger Tore, taktischer.',c:'hot'});
    score+=20;
    sigs.push({i:'🛡️',n:'Taktisches Spiel erwartet',d:'K.O.-Spiele enden häufiger torarm. Über 2.5 Tore seltener (~42% vs. 55% normal).',c:'neu'});
  }

  // Bedeutungslos
  if(isLastDay){
    sigs.push({i:'📅',n:'Bedeutungsloses Saisonende',d:'Kein Entscheidungscharakter. Rotation wahrscheinlich, Motivation reduziert.',c:'warn'});
    score-=25;
    const favOdds=Math.min(hO.price,aO.price);
    if(favOdds<1.60){
      sigs.push({i:'⚠️',n:'Niedriger Favorit – erhöhtes Risiko',d:`Quote ${favOdds.toFixed(2)} aber Team ohne Motivation rotiert. ~30% Verlustrisiko bei bedeutungslosen Favoriten.`,c:'warn'});
      score-=15;
    }
  }

  // Konsens
  if(con?.ok){
    sigs.push({i:'🤝',n:`Buchmacher-Konsens (${con.cnt})`,d:`Alle ${con.cnt} Buchmacher einig – Spread ${con.sp}. Sehr verlässlich.`,c:'good'});
    score+=28;
  }else if(con?.unc){
    sigs.push({i:'❓',n:'Buchmacher uneinig',d:`Großer Spread (${con.sp}). Markt unsicher.`,c:'warn'});
    score-=15;
  }

  // Risiko-Favorit
  const favO=Math.min(hO.price,aO.price);
  if(favO<1.50&&dO&&pD>0.22&&!isRel){
    sigs.push({i:'⚠️',n:'Risiko-Favorit',d:`Quote ${favO.toFixed(2)} niedrig aber Unentschieden ${Math.round(pD*100)}% wahrscheinlich.`,c:'warn'});
    score-=18;
  }

  // Außenseiter
  const under=pH<pA?{n:game.home_team,o:hO.price,p:pH}:{n:game.away_team,o:aO.price,p:pA};
  const isUp=under.o>2.0&&under.o<3.8&&under.p>0.26&&Math.abs(pH-pA)<0.28;
  if(isUp){
    sigs.push({i:'⚡',n:'Außenseiter-Signal',d:`${under.n} (${under.o.toFixed(2)}) hat ${Math.round(under.p*100)}% Wahrscheinlichkeit trotz Außenseiter-Rolle.`,c:'hot'});
    score+=20;
  }

  // Faire Quoten
  if(vig<=3){
    sigs.push({i:'📊',n:'Sehr faire Quoten',d:`Marge nur ${vig}%. Quoten sehr genau.`,c:'good'});
    score+=10;
  }

  if(!sigs.length){
    const fav=pH>=pA?{n:game.home_team,o:hO.price,p:pH}:{n:game.away_team,o:aO.price,p:pA};
    sigs.push({i:'📈',n:'Klarer Favorit',d:`${fav.n} mit ${Math.round(fav.p*100)}% Wahrscheinlichkeit.`,c:'neu'});
    score+=Math.round(fav.p*35);
  }

  const isSkip=score<-10;
  const isHot=score>=35;
  const isCon=con?.ok||false;
  const tags=[];
  if(isRel) tags.push({l:'🔥 Relegation',c:'tag-hot'});
  if(isKO) tags.push({l:'🏆 K.O.',c:'tag-hot'});
  if(isLastDay) tags.push({l:'📅 Bedeutungslos',c:'tag-warn'});
  if(isCon) tags.push({l:'🤝 Konsens',c:'tag-good'});
  if(isUp) tags.push({l:'⚡ Außenseiter',c:'tag-hot'});
  if(isSkip) tags.push({l:'⚠️ Vorsicht',c:'tag-warn'});
  if(vig<=3) tags.push({l:'📊 Fair',c:'tag-good'});

  const fav=pH>=pA?{n:game.home_team,o:hO.price}:{n:game.away_team,o:aO.price};
  const tip=isSkip?'⚠️ Überspringen':isUp?`${under.n} gewinnt`:`${fav.n} gewinnt`;
  const tipO=isUp?under.o:fav.o;
  const sc=score>=35?`🔥 ${score}`:score>=15?`✅ ${score}`:score>=0?`📊 ${score}`:`⚠️ ${score}`;
  const scC=score>=35?'sc-hot':score>=15?'sc-good':score>=0?'sc-ok':'sc-skip';
  const scCol=score>=35?'#ffd600':score>=15?'#00e676':score>=0?'#6a8f6a':'#ff5722';

  return{
    id:game.id,match:`${game.home_team} vs ${game.away_team}`,
    home:game.home_team,away:game.away_team,
    leagueLabel:lg.label,leagueKey:lg.key,
    date:d,today:isToday(d),tomorrow:isTomorrow(d),
    time:`${d.toLocaleDateString('de-DE',{weekday:'short',day:'2-digit',month:'2-digit'})} ${d.toLocaleTimeString('de-DE',{hour:'2-digit',minute:'2-digit'})}`,
    tip,tipO,sigs,tags,score,sc,scC,scCol,
    isHot,isSkip,isUp,isCon,isRel,isLastDay,
    hO:hO.price,aO:aO.price,dO:dO?.price,
    pH:Math.round(pH*100),pD:Math.round(pD*100),pA:Math.round(pA*100),
    vig,con,bm:bm.title,bmC:bms.length,
  };
}

async function load(){
  document.getElementById('btn').disabled=true;
  document.getElementById('pst').textContent='Verbinde…';
  document.getElementById('pf').style.width='0%';
  document.getElementById('picks-wrap').style.display='none';
  document.getElementById('warn-wrap').style.display='none';
  document.getElementById('content').innerHTML='<div class="empty">Lade…</div>';
  games=[];
  const sel=document.getElementById('f-league');
  sel.innerHTML='<option value="all">Alle Ligen</option>';

  for(let i=0;i<LEAGUES.length;i++){
    const lg=LEAGUES[i];
    document.getElementById('pst').textContent=`${lg.label}… (${i+1}/${LEAGUES.length})`;
    document.getElementById('pf').style.width=Math.round(i/LEAGUES.length*90)+'%';
    const data=await fetchLeague(lg);
    if(!data||!data.length) continue;
    const opt=document.createElement('option');
    opt.value=lg.key;opt.textContent=lg.label;sel.appendChild(opt);
    data.forEach(g=>{const r=analyze(g,lg);if(r)games.push(r);});
    render(); // Show immediately
  }

  document.getElementById('pf').style.width='100%';
  document.getElementById('pst').textContent=games.length?`${games.length} Spiele geladen`:'Keine Spiele gefunden';
  document.getElementById('btn').disabled=false;
}

function getAll(){
  const lg=document.getElementById('f-league').value;
  const wh=document.getElementById('f-when').value;
  return games.filter(g=>{
    if(lg!=='all'&&g.leagueKey!==lg)return false;
    if(wh==='today'&&!g.today)return false;
    if(wh==='tomorrow'&&!g.tomorrow)return false;
    if(wh==='weekend'){const d=g.date.getDay();if(d!==0&&d!==6)return false;}
    return true;
  }).sort((a,b)=>{
    if(a.today&&!b.today)return -1;
    if(!a.today&&b.today)return 1;
    if(a.isSkip&&!b.isSkip)return 1;
    if(!a.isSkip&&b.isSkip)return -1;
    return b.score-a.score;
  });
}

function render(){
  const all=getAll();
  const picks=all.filter(g=>!g.isSkip).slice(0,3);
  const warns=all.filter(g=>g.isSkip&&(g.today||g.tomorrow)).slice(0,3);

  // Picks
  const pw=document.getElementById('picks-wrap');
  if(picks.length){
    pw.style.display='block';
    document.getElementById('picks').innerHTML=picks.map((g,i)=>{
      const t=g.isHot?'hot':'';
      const tl=g.isHot?'🔥 Top Pick':'✅ Empfehlung';
      const s=g.sigs.find(s=>s.c!=='warn')||g.sigs[0];
      return `<div class="pick ${t}">
        <div class="pnum">${i+1}</div>
        <div class="pbody">
          <div class="ptyp ${t}">${tl} · Score ${g.score}</div>
          <div class="pmatch">${g.match}</div>
          <div class="ptip ${t}">✅ ${g.tip}</div>
          <div class="pinfo">${g.leagueLabel}${g.today?' · HEUTE':g.tomorrow?' · MORGEN':''} · ${g.time}<br>${s.i} ${s.d.slice(0,80)}…</div>
        </div>
        <div class="pright"><div class="podds">${g.tipO.toFixed(2)}</div><div class="pbm">${g.bmC} BM</div></div>
      </div>`;
    }).join('');
  } else pw.style.display='none';

  // Warns
  const ww=document.getElementById('warn-wrap');
  if(warns.length){
    ww.style.display='block';
    document.getElementById('warns').innerHTML=warns.map(g=>`
      <div class="wbox"><strong>⚠️ ${g.match}</strong>${g.sigs.find(s=>s.c==='warn')?.d||'Analyse empfiehlt Vorsicht.'}</div>`).join('');
  } else ww.style.display='none';

  // List
  const c=document.getElementById('content');
  if(!games.length){c.innerHTML='<div class="empty">Tippe auf "Tipps laden"</div>';return;}
  if(!all.length){c.innerHTML='<div class="empty">Keine Spiele für diesen Filter.</div>';return;}

  const div=document.createElement('div');div.className='list';
  all.forEach((g,i)=>{
    const tagsH=g.tags.map(t=>`<span class="tag ${t.c}">${t.l}</span>`).join('');
    const sigsH=g.sigs.map(s=>`<div class="sig"><div class="sigi">${s.i}</div><div><div class="sign">${s.n}</div><div class="sigd">${s.d}</div></div></div>`).join('');
    const o3=`<div class="odds3">
      <div class="ob${g.pH>=g.pA&&g.pH>=g.pD?' best':''}"><div class="obl">Heim</div><div class="obv">${g.hO.toFixed(2)}</div><div class="obp">${g.pH}%</div></div>
      ${g.dO?`<div class="ob"><div class="obl">Unentsch.</div><div class="obv">${g.dO.toFixed(2)}</div><div class="obp">${g.pD}%</div></div>`:'<div></div>'}
      <div class="ob${g.pA>g.pH&&g.pA>=g.pD?' best':''}"><div class="obl">Auswärts</div><div class="obv">${g.aO.toFixed(2)}</div><div class="obp">${g.pA}%</div></div>
    </div>`;
    const bmH=g.con?.det?.length>1?g.con.det.map(b=>`<div class="bml">${b.n}<span>H ${b.h.toFixed(2)}${b.d?` X ${b.d.toFixed(2)}`:''} A ${b.a.toFixed(2)}</span></div>`).join(''):'';

    const el=document.createElement('div');
    el.className=`card${g.isSkip?' danger':''}`;
    el.style.animationDelay=(i*0.04)+'s';
    el.onclick=()=>{exp=exp===g.id?null:g.id;render();};
    el.innerHTML=`
      <div class="sbar" style="background:linear-gradient(90deg,${g.scCol} ${Math.max(0,g.score)}%,var(--d4) ${Math.max(0,g.score)}%)"></div>
      <div class="ch">
        <div>
          <div class="cmatch">${g.match}</div>
          <div class="csub">${g.leagueLabel} · ${g.today?'<b style="color:var(--g)">HEUTE</b> · ':g.tomorrow?'<b style="color:var(--gold)">MORGEN</b> · ':''}${g.time}</div>
          <div class="tags">${tagsH}</div>
        </div>
        <div class="cr">
          <span class="cscore ${g.scC}">${g.sc}</span>
          <span class="codds">${g.tipO.toFixed(2)}</span>
          <span class="cbm">${g.bmC} BM</span>
        </div>
      </div>
      <div class="cx">
        <div class="xt">🔍 Signale</div>${sigsH}
        <div class="xt">📊 Quoten</div>${o3}
        ${bmH?`<div class="xt">🤝 Buchmacher</div>${bmH}`:''}
        <div class="rec">
          <div><div class="rect" style="color:${g.isSkip?'var(--or)':'var(--g)'}">${g.isSkip?'⚠️ Besser überspringen':'✅ '+g.tip}</div><div class="recs">Score ${g.score} · Marge ${g.vig}% · ${g.bmC} Buchmacher</div></div>
          <div class="reco">${g.tipO.toFixed(2)}</div>
        </div>
      </div>`;
    if(exp===g.id) el.classList.add('open');
    div.appendChild(el);
  });
  c.innerHTML='';c.appendChild(div);
}

render();
</script>
</body>
</html>
